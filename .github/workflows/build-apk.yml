name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Instalar Dependencias
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 🔄 Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: 🛠️ Compilar APK en Android Studio
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 🚀 Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: SocialBet-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk